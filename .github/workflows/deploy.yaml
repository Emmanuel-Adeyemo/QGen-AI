name: Sync to Hugging Face Space

on:
  push:
    branches: [main]

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # add hf as a remote repo
          git remote add hf https://eadey:$HF_TOKEN@huggingface.co/spaces/Emmanuel-Adeyemo/QGen-AI
          
          # force push
          git push hf main --force